<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <img class="logo" src="Dragon_Ball_Z_logo.svg" alt="logo">
        <button id="btn-menu" onclick="ouvrirMenu()">☰</button>
        <p class="accueil1" onclick="window.location.href='Index.html'" style="cursor:pointer">Accueil</p>
        <p class="catalogue1" onclick="window.location.href='Index.html'" style="cursor:pointer">Catalogue</p>
        <p class="mondeck1" onclick="window.location.href='decks.html'" style="cursor:pointer">Mon deck</p>
        <p class="video1" onclick="window.location.href='tournois.html'" style="cursor:pointer">Vidéos</p>
        <p class="contact1" onclick="window.location.href='contact.html'" style="cursor:pointer">Contact</p>
        <button id="btn-dark" onclick="basculerMode()">Sombre</button>
    </header>
    <div class="page-contenu">
        <h2>Contactez-nous</h2>
        <div class="formulaire">
            <input type="text" placeholder="Votre nom" class="champ-input">
            <input type="email" placeholder="Votre email" class="champ-input">
            <textarea placeholder="Votre message" class="champ-input" style="height:120px;resize:none;"></textarea>
            <button class="btn-connexion" onclick="alert('Message envoyé !')">Envoyer</button>
        </div>
    </div>
</body>

</html>
