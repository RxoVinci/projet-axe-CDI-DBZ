<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakarot présentation super saiyan blue</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <img class="logo" src="Dragon_Ball_Z_logo.svg" alt="logo">
        <button id="btn-menu" onclick="ouvrirMenu()">☰</button>
        <p class="accueil1">Accueil</p>
        <p class="catalogue1">Catalogue</p>
        <p class="mondeck1">Mon deck</p>
        <p class="video1">Vidéos</p>
        <p class="contact1">Contact</p>
        <button id="btn-dark" onclick="basculerMode()">🌙</button>
    </header>

    <div id="menu-mobile">
        <p onclick="fermerMenu()">✕</p>
        <p>Accueil</p>
        <p>Catalogue</p>
        <p>Mon deck</p>
        <p>Vidéos</p>
        <p>Contact</p>
    </div>

    <div class="hero">
        <div class="hero-texte">
            <h1 class="hero-titre">Collection Dragon Ball Z</h1>
            <p class="hero-sous-titre">Découvrez, collectionnez et échangez vos cartes</p>
        </div>
        <img class="hero-perso" src="goku.png" alt="Goku">
    </div>

    <div id="filtres"></div>

    <h2 class="titre-catalogue">Catalogue des personnages</h2>

    <div id="grille-cartes"></div>

    <script src="main.js"></script>

</body>

</html>
