<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakarot présentation super saiyan blue</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <img class="logo" src="Dragon_Ball_Z_logo.svg" alt="logo">
        <button id="btn-menu" onclick="ouvrirMenu()">☰</button>
        <p class="accueil1" onclick="window.location.href='Index.html'" style="cursor:pointer">Accueil</p>
        <p class="catalogue1" onclick="window.location.href='catalogue.html'" style="cursor:pointer">Catalogue</p>
        <p class="mondeck1" onclick="window.location.href='decks.html'" style="cursor:pointer">Mon deck</p>
        <p class="video1" onclick="window.location.href='tournois.html'" style="cursor:pointer">Vidéos</p>
        <p class="contact1" onclick="window.location.href='contact.html'" style="cursor:pointer">Contact</p>
        <button id="btn-dark" onclick="basculerMode()">🌙</button>
    </header>

    <div id="menu-mobile">
        <p onclick="fermerMenu()">✕</p>
        <p onclick="window.location.href='Index.html'">Accueil</p>
        <p onclick="window.location.href='connexion.html'">Connexion</p>
        <p onclick="window.location.href='decks.html'">Decks Communauté</p>
        <p onclick="window.location.href='tournois.html'">Tournois</p>
    </div>

    <div class="hero">
        <div class="hero-texte">
            <h1 class="hero-titre">Collection Dragon Ball Z</h1>
            <p class="hero-sous-titre">Découvrez, collectionnez et échangez vos cartes</p>
        </div>
        <img class="hero-perso" src="goku.png" alt="Goku">
    </div>

    <h2 class="titre-catalogue">Personnages Spéciaux</h2>
    <div id="grille-speciaux"></div>

    <div id="filtres"></div>

    <h2 class="titre-catalogue">Catalogue des personnages</h2>

    <div id="grille-cartes"></div>

    <script src="main.js"></script>

</body>

</html>
