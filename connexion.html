<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <img class="logo" src="Dragon_Ball_Z_logo.svg" alt="logo">
        <button id="btn-menu" onclick="ouvrirMenu()">☰</button>
        <p class="accueil1" onclick="window.location.href='Index.html'" style="cursor:pointer">Accueil</p>
        <p class="catalogue1" onclick="window.location.href='catalogue.html'" style="cursor:pointer">Catalogue</p>
        <p class="mondeck1" onclick="window.location.href='decks.html'" style="cursor:pointer">Mon deck</p>
        <p class="video1" onclick="window.location.href='tournois.html'" style="cursor:pointer">Vidéos</p>
        <p class="contact1" onclick="window.location.href='contact.html'" style="cursor:pointer">Contact</p>
        <button id="btn-dark" onclick="basculerMode()">🌙</button>
    </header>

    <div class="page-contenu">
        <h2>Connexion</h2>
        <div class="formulaire">
            <input type="email" placeholder="Adresse email" class="champ-input">
            <input type="password" placeholder="Mot de passe" class="champ-input">
            <button class="btn-connexion">Se connecter</button>
            <p class="lien-inscription">Pas encore inscrit ? <span onclick="alert('Inscription bientôt disponible')"
                    style="cursor:pointer;color:#3b82f6">Créer un compte</span></p>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
